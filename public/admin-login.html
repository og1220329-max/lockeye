<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — LockEye Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAF7F2;--card:#ffffff;--text:#2A1513;--text-2:#4A3833;--text-3:#7C6B5C;--border:#E8E0D4;--border-focus:#8B1A2E;--primary:#8B1A2E;--primary-hover:#6D1223;--primary-light:rgba(139,26,46,.08);--accent:#FF7000;--shadow-sm:0 1px 2px rgba(42,21,19,.04);--shadow-lg:0 24px 60px -20px rgba(42,21,19,.18),0 10px 30px -10px rgba(42,21,19,.1);--radius:16px;--radius-lg:24px;--font:'DM Sans',sans-serif;--display:'Bricolage Grotesque',sans-serif;--mono:'JetBrains Mono',monospace;--transition:all .2s cubic-bezier(.4,0,.2,1)}
[data-theme=dark]{--bg:#1A0E0C;--card:#241412;--text:#FAF7F2;--text-2:#E8E0D4;--text-3:#7C6B5C;--border:#3A1C18;--shadow-lg:0 24px 60px -20px rgba(0,0,0,.5),0 10px 30px -10px rgba(0,0,0,.3)}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.theme-toggle{position:fixed;top:24px;right:24px;z-index:10;width:44px;height:44px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);box-shadow:var(--shadow-sm)}
.theme-toggle:hover{border-color:var(--primary);color:var(--primary)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:44px 40px 38px;max-width:420px;width:100%;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;transition:background .3s,border-color .3s}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:38px;height:38px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center}
.logo-text{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.03em}
.logo-text .eye{color:var(--accent)}
.logo-sub{font-size:10px;color:var(--text-3);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
h1{font-size:24px;font-family:var(--display);font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.sub{color:var(--text-2);font-size:14px;margin-bottom:30px;line-height:1.5}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;letter-spacing:.01em}
.form-group input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:var(--transition);background:var(--bg)}
.form-group input:focus{border-color:var(--border-focus);background:var(--card);box-shadow:0 0 0 3px var(--primary-light)}
.form-group input::placeholder{color:var(--text-3)}
.btn-submit{width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-family:var(--font);font-weight:600;font-size:15px;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{background:var(--primary-hover);box-shadow:0 8px 24px rgba(139,26,46,.3)}
.btn-submit:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.error-msg{display:none;align-items:flex-start;gap:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:12px 14px;font-size:13px;color:#ef4444;margin-bottom:18px;line-height:1.45}
.error-msg.show{display:flex}
.error-msg svg{flex:0 0 auto;margin-top:1px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--text-3);text-decoration:none;font-size:13px;margin-bottom:28px;transition:var(--transition)}
.back-link:hover{color:var(--primary)}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn-submit.loading .spinner{display:block}
.btn-submit.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-text{margin-top:24px;text-align:center;font-size:12px;color:var(--text-3)}
.footer-text a{color:var(--primary);text-decoration:none;font-weight:500}
.footer-text a:hover{text-decoration:underline}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="Toggle theme">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<div class="login-card">
  <a class="back-link" href="/">&larr; Back to site</a>
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 100 100"><rect x="20" y="38" width="27" height="24" rx="6" fill="#8B1A2E"/><rect x="53" y="38" width="27" height="24" rx="6" fill="#8B1A2E"/><circle cx="33.5" cy="50" r="6" fill="#E0352A"/><circle cx="66.5" cy="50" r="6" fill="#FF7000"/></svg>
    </div>
    <div><div class="logo-text">lock<span class="eye">EYE</span></div><div class="logo-sub">Admin Panel</div></div>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your account to manage LockEye.</p>
  <div class="error-msg" id="loginError">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText">Invalid username or password.</span>
  </div>
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" required autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-submit" id="loginBtn">
      <span class="btn-text">Sign in</span>
      <span class="spinner"></span>
    </button>
  </form>
  <div class="footer-text">
    Default: <a href="#" onclick="document.getElementById('username').value='admin';document.getElementById('password').value='lockeye2024';return false">admin / lockeye2024</a>
  </div>
</div>
<script>
const themeToggle = document.getElementById('themeToggle');
const saved = localStorage.getItem('adminTheme') || 'light';
document.documentElement.setAttribute('data-theme', saved);
themeToggle.innerHTML = saved === 'dark'
  ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
  : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
themeToggle.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('adminTheme', next);
  themeToggle.innerHTML = next === 'dark'
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
});
async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  const errorText = document.getElementById('errorText');
  const btn = document.getElementById('loginBtn');
  errorEl.classList.remove('show');
  btn.classList.add('loading');
  btn.disabled = true;
  try {
    const res = await fetch('/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (res.ok) { window.location.href = data.redirect || '/admin'; return; }
    errorText.textContent = data.error || 'Invalid username or password.';
    errorEl.classList.add('show');
  } catch {
    errorText.textContent = 'Network error. Please try again.';
    errorEl.classList.add('show');
  }
  btn.classList.remove('loading');
  btn.disabled = false;
}
</script>
</body>
</html>
