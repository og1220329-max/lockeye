<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light only" />
<title>404 — LockEye</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--ink:#2A1513;--ink-soft:#7C6B5C;--maroon:#8B1A2E;--orange:#FF7000;--line:#E8E0D4;--display:'Bricolage Grotesque',sans-serif;--body:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--cream);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{max-width:460px}
.code{font-family:var(--display);font-weight:800;font-size:100px;letter-spacing:-.04em;background:linear-gradient(100deg,var(--maroon),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin-bottom:8px}
h1{font-family:var(--display);font-weight:700;font-size:24px;letter-spacing:-.02em;margin-bottom:12px}
p{color:var(--ink-soft);font-size:15px;margin-bottom:32px;line-height:1.6}
a{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(100deg,var(--maroon),var(--orange-deep,var(--orange)));color:#fff;text-decoration:none;padding:14px 28px;border-radius:12px;font-weight:600;font-size:15px;transition:all .25s}
a:hover{box-shadow:0 8px 32px rgba(139,26,46,.35);transform:translateY(-1px)}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <h1>This page doesn't exist.</h1>
  <p>Either you took a wrong turn, or this URL never made it past the idea stage.</p>
  <a href="/">&larr; Back to LockEye</a>
</div>
</body>
</html>
