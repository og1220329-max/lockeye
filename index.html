<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light only" />
<meta name="theme-color" content="#FAF7F2" />
<title>LockEye: Stop paying for a gym you never go to</title>
<meta name="description" content="LockEye puts real money on the line every time you skip the gym. Prove you showed up with GPS and a selfie, keep your cash. Skip, and 85% goes to charity." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='47' fill='%23F4F2EC' stroke='%238B1A2E' stroke-width='5'/><rect x='20' y='38' width='27' height='24' rx='6' fill='%231A0E0C'/><rect x='53' y='38' width='27' height='24' rx='6' fill='%231A0E0C'/><circle cx='33.5' cy='50' r='6' fill='%23E0352A'/><circle cx='66.5' cy='50' r='6' fill='%23FF7000'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light only;
    --maroon:#8B1A2E; --maroon-deep:#6D1223;
    --orange:#FF7000; --orange-deep:#E35200; --amber:#F5A623;
    --crimson:#E0352A;
    --cream:#FAF7F2; --cream-2:#F4F2EC; --card:#FFFFFF;
    --ink:#2A1513; --ink-soft:#7C6B5C; --line:#E8E0D4;
    --green:#1F8A55;
    --display:"Bricolage Grotesque",sans-serif;
    --body:"DM Sans",sans-serif; --mono:"JetBrains Mono",monospace;
    --maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;background:#FAF7F2;-webkit-text-size-adjust:100%;forced-color-adjust:none}
  main{background:#FAF7F2}
  #top,#how,#demo,#calc-hero,#pricing,#contact,#proof{scroll-margin-top:92px}
  body{font-family:var(--body);background:#FAF7F2;color:#2A1513;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:var(--orange);color:#fff}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--maroon);font-weight:600;display:inline-flex;align-items:center;gap:8px}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--orange)}

  /* NAV */
  header.nav{position:sticky;top:0;z-index:60;background:rgba(250,247,242,.82);backdrop-filter:saturate(150%) blur(14px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:76px}
  .brand{display:flex;align-items:center;gap:13px}
  .brand .logo-mark{flex:0 0 auto;display:flex;align-items:center;line-height:0}
  .brand-text{display:flex;flex-direction:column;justify-content:center}
  .brand-name{font-family:var(--display);font-weight:800;font-size:23px;letter-spacing:-.02em;line-height:1;position:relative}
  .brand-name .eye{color:var(--orange)}
  .brand-name .reg{font-size:9px;font-weight:600;vertical-align:super;color:var(--ink-soft);margin-left:2px}
  .brand-tag{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase;margin-top:3px}
  nav.links{display:flex;gap:6px}
  nav.links a{font-size:14.5px;font-weight:500;padding:8px 14px;border-radius:9px;transition:.15s}
  nav.links a:hover{background:var(--cream-2)}
  nav.links a.active{background:#F3DEE2;color:var(--maroon)}
  .nav-right{display:flex;align-items:center;gap:10px}
  .btn{font-family:var(--body);font-weight:600;font-size:14.5px;border:none;cursor:pointer;border-radius:11px;padding:11px 18px;transition:.18s;display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:var(--orange);color:#2A1513}
  .btn-primary:hover{background:var(--orange-deep);color:#fff;box-shadow:0 8px 26px rgba(255,112,0,.32)}
  .btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--maroon);color:var(--maroon)}
  .btn-free{font-family:var(--mono);font-size:11px;letter-spacing:.1em;font-weight:600;border:1.5px solid var(--line);border-radius:9px;padding:9px 13px;display:inline-flex;align-items:center;gap:7px;color:var(--ink-soft)}

  /* HERO */
  .hero{position:relative;padding:88px 0 70px;overflow:hidden;background:#FAF7F2}
  .hero-glow{position:absolute;right:-8%;top:8%;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.16),rgba(255,112,0,.05) 45%,transparent 70%);pointer-events:none;z-index:0}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:54px;align-items:center;position:relative;z-index:1}
  .badge{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 15px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--maroon);font-weight:600;margin-bottom:28px}
  .badge .pulse{position:relative;width:8px;height:8px}
  .badge .pulse i{position:absolute;inset:0;border-radius:50%;background:var(--orange)}
  .badge .pulse i:first-child{animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{75%,100%{transform:scale(2.4);opacity:0}}
  h1.hero-title{font-family:var(--display);font-weight:800;letter-spacing:-.035em;font-size:clamp(46px,6.1vw,82px);line-height:.96}
  h1.hero-title .l1{color:var(--ink);display:block}
  h1.hero-title .l2{display:block;background:linear-gradient(100deg,var(--maroon) 0%,var(--orange-deep) 42%,var(--orange) 68%,var(--amber) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{height:3px;width:140px;border-radius:2px;margin:26px 0 24px;background:linear-gradient(90deg,var(--maroon),var(--orange),var(--amber),transparent)}
  .hero-sub{font-size:clamp(16px,1.4vw,18.5px);color:#4A3833;max-width:480px;line-height:1.6}
  .hero-sub b{color:var(--ink);font-weight:600}
  .hero-cta{display:flex;gap:14px;margin:34px 0 22px;flex-wrap:wrap}
  .hero-cta .btn{padding:15px 24px;font-size:16px;border-radius:13px}
  .btn-hero{background:linear-gradient(100deg,var(--maroon),var(--orange-deep));color:#fff}
  .btn-hero:hover{box-shadow:0 14px 34px rgba(139,26,46,.32);transform:translateY(-1px)}
  .assurances{display:flex;gap:22px;flex-wrap:wrap;font-size:13.5px;color:var(--ink-soft)}
  .assurances span{display:inline-flex;align-items:center;gap:7px}

  /* PHONE (shared) */
  .phone-stage{display:flex;justify-content:center;position:relative}
  .phone{width:300px;background:#fff;border-radius:42px;padding:10px;border:1px solid var(--line);box-shadow:0 40px 90px -28px rgba(139,26,46,.34),0 10px 30px rgba(42,21,19,.10);position:relative;z-index:2}
  .phone-screen{background:#FAF7F2;border-radius:34px;padding:20px 18px 22px;overflow:hidden}
  .ph-top{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;color:var(--ink-soft)}
  .ph-top .live{display:inline-flex;align-items:center;gap:6px;color:var(--maroon)}
  .ph-top .live i{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:blink 1.6s infinite}
  @keyframes blink{50%{opacity:.3}}
  .ph-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center}
  .stake-pill{background:var(--maroon);color:#fff;font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.04em}
  .goal-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}
  .goal-title{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em;margin-bottom:5px}
  .goal-loc{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
  .timer-box{background:var(--cream-2);border:1px solid var(--line);border-radius:14px;margin-top:14px;padding:11px;text-align:center}
  .timer-box .cap{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
  .timer-box .t{font-family:var(--mono);font-weight:600;font-size:30px;letter-spacing:.02em;color:var(--ink);margin-top:3px}
  .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px}
  .mini{background:#fff;border:1px solid var(--line);border-radius:13px;padding:10px}
  .mini .n{font-family:var(--display);font-weight:700;font-size:17px}
  .mini .c{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-top:1px}
  .checkin-btn{margin-top:13px;width:100%;background:linear-gradient(100deg,var(--maroon),var(--orange-deep));color:#fff;border:none;border-radius:13px;padding:13px;font-family:var(--body);font-weight:600;font-size:14px;cursor:pointer}
  .receipt{position:absolute;left:-34px;bottom:46px;z-index:3;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 40px -16px rgba(42,21,19,.28);padding:13px 15px;width:172px;font-family:var(--mono)}
  .receipt .h{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px}
  .receipt .row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
  .receipt .row b{color:var(--maroon);font-weight:600}
  .receipt .kept{color:var(--green)}

  section.block{padding:86px 0;background:#FAF7F2}
  .sec-head{max-width:640px;margin-bottom:48px}
  .sec-head h2{font-family:var(--display);font-weight:800;letter-spacing:-.03em;font-size:clamp(32px,4.4vw,50px);line-height:1.02;margin:16px 0 14px}
  .sec-head p{font-size:17px;color:#4A3833;max-width:560px}

  /* MECHANIC */
  .mech{background:#FAF7F2;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .ledger{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 24px 60px -34px rgba(42,21,19,.22)}
  .ledger-head{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px dashed var(--line);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  .ledger-head b{color:var(--maroon);font-weight:600}
  .steps{display:grid;grid-template-columns:repeat(4,1fr)}
  .step{padding:30px 24px;border-right:1px dashed var(--line)}
  .step:last-child{border-right:none}
  .step .idx{font-family:var(--mono);font-size:12px;color:var(--orange);font-weight:600}
  .step h3{font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:-.01em;margin:14px 0 8px}
  .step p{font-size:13.5px;color:var(--ink-soft);line-height:1.55}
  .step .ico{width:38px;height:38px;border-radius:11px;background:#F3DEE2;display:flex;align-items:center;justify-content:center;margin-top:18px}
  .step .ico svg{stroke:var(--maroon)}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;margin-top:56px}
  .split-copy h3{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.02em;margin-bottom:12px}
  .split-copy p{color:#4A3833;font-size:15.5px;max-width:430px}
  .split-bar{display:flex;height:64px;border-radius:14px;overflow:hidden;border:1px solid var(--line);font-family:var(--mono);color:#fff;font-weight:600}
  .split-charity{flex:0 0 85%;background:linear-gradient(120deg,var(--maroon),var(--maroon-deep));display:flex;flex-direction:column;justify-content:center;padding:0 20px}
  .split-app{flex:0 0 15%;background:linear-gradient(120deg,var(--orange),var(--orange-deep));display:flex;flex-direction:column;justify-content:center;padding:0 12px;align-items:flex-end;text-align:right}
  .split-bar .pct{font-size:21px;line-height:1}
  .split-bar .lbl{font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;opacity:.85;margin-top:4px}
  .split-note{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:14px;text-align:center}

  /* APP DEMO */
  .demo{background:#FAF7F2;border-bottom:1px solid var(--line)}
  .demo-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:52px;align-items:center;margin-top:10px}
  .demo-controls{background:var(--cream-2);border:1px solid var(--line);border-radius:22px;padding:30px}
  .dc-head{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:22px}
  .dc-head .live-tag{display:inline-flex;align-items:center;gap:7px;color:var(--maroon);font-weight:600}
  .dc-head .live-tag i{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:blink 1.6s infinite}
  .dc-block{margin-bottom:22px}
  .dc-block .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
  .dc-block .lab .val{font-family:var(--display);font-weight:800;font-size:22px;color:var(--maroon);letter-spacing:-.02em}
  .dc-block .hint{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
  input[type=range]{width:100%;accent-color:var(--maroon);height:6px}
  .range-ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);margin-top:6px;text-transform:uppercase;letter-spacing:.06em}
  .override-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  .ov-btn{border:none;cursor:pointer;border-radius:13px;padding:15px 12px;font-family:var(--body);font-weight:600;font-size:14.5px;transition:.16s;display:flex;flex-direction:column;align-items:center;gap:3px}
  .ov-btn .sub{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;opacity:.8}
  .ov-success{background:rgba(31,138,85,.12);color:var(--green);border:1.5px solid rgba(31,138,85,.35)}
  .ov-success:hover{background:var(--green);color:#fff}
  .ov-forfeit{background:rgba(139,26,46,.1);color:var(--maroon);border:1.5px solid rgba(139,26,46,.35)}
  .ov-forfeit:hover{background:var(--maroon);color:#fff}
  .dc-reset{margin-top:18px;width:100%;background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:11px;padding:11px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:.15s}
  .dc-reset:hover{border-color:var(--ink-soft);color:var(--ink)}
  /* demo phone status banner */
  .status-banner{border-radius:13px;padding:11px 14px;margin:14px 0 0;font-family:var(--mono);font-size:11px;letter-spacing:.04em;display:flex;align-items:center;gap:9px;font-weight:500}
  .status-pending{background:var(--cream-2);color:var(--ink-soft);border:1px solid var(--line)}
  .status-kept{background:rgba(31,138,85,.1);color:var(--green);border:1px solid rgba(31,138,85,.3)}
  .status-skipped{background:rgba(139,26,46,.08);color:var(--maroon);border:1px solid rgba(139,26,46,.25)}
  .bump{animation:bump .4s ease}
  @keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}

  /* PROOF */
  .proof{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .proof-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px 26px}
  .proof-card .ico{width:42px;height:42px;border-radius:12px;background:var(--cream-2);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .proof-card .ico svg{stroke:var(--maroon)}
  .proof-card h3{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:8px;letter-spacing:-.01em}
  .proof-card p{font-size:14px;color:var(--ink-soft);line-height:1.55}

  /* PRICING */
  .pricing{background:#FAF7F2;border-top:1px solid var(--line)}
  .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px}
  .plan{background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px 32px;position:relative}
  .plan.pro{border:1.5px solid var(--orange);box-shadow:0 26px 60px -30px rgba(255,112,0,.4)}
  .plan-tag{position:absolute;top:-13px;left:32px;background:var(--orange);color:#2A1513;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:999px}
  .plan .pname{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .plan .price{font-family:var(--display);font-weight:800;font-size:50px;letter-spacing:-.03em;margin:10px 0 2px;display:flex;align-items:baseline;gap:8px}
  .plan .price small{font-family:var(--mono);font-size:15px;color:var(--ink-soft);text-decoration:line-through;font-weight:400}
  .plan .price-cap{font-size:13px;color:var(--ink-soft);margin-bottom:22px}
  .plan ul{list-style:none;margin:22px 0;display:flex;flex-direction:column;gap:13px}
  .plan li{display:flex;align-items:flex-start;gap:11px;font-size:14.5px}
  .plan li svg{flex:0 0 auto;margin-top:3px;stroke:var(--maroon)}
  .plan .btn{width:100%;justify-content:center;margin-top:6px}
  .scarce{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--maroon);margin-top:14px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}

  /* FINAL */
  .final{padding:96px 0;background:#FAF7F2}
  .final-card{background:linear-gradient(120deg,var(--maroon),var(--maroon-deep) 55%,#4A0C18);border-radius:28px;padding:64px 48px;text-align:center;position:relative;overflow:hidden}
  .final-card::after{content:"";position:absolute;right:-10%;top:-40%;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(255,112,0,.28),transparent 65%)}
  .final-card .badge-mark{position:relative;z-index:1;margin:0 auto 22px;display:flex;justify-content:center}
  .final-card .eyebrow{color:var(--amber);position:relative;z-index:1}
  .final-card .eyebrow .dot{background:var(--amber)}
  .final-card h2{font-family:var(--display);font-weight:800;font-size:clamp(30px,4.4vw,52px);letter-spacing:-.03em;color:#fff;line-height:1.02;margin:18px auto 16px;max-width:680px;position:relative;z-index:1}
  .final-card p{color:rgba(255,255,255,.78);font-size:17px;max-width:480px;margin:0 auto 32px;position:relative;z-index:1}
  .final-card .btn{position:relative;z-index:1;background:var(--orange);color:#2A1513;padding:16px 30px;font-size:16px}
  .final-card .btn:hover{background:#fff}

  /* FOOTER */
  footer{background:#FAF7F2;border-top:1px solid var(--line);padding:46px 0 40px}
  .foot{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:28px}
  .foot-tag{font-size:13.5px;color:var(--ink-soft);max-width:300px;margin-top:12px}
  .foot-cols{display:flex;gap:56px;flex-wrap:wrap}
  .foot-col h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px}
  .foot-col a{display:block;font-size:14px;margin-bottom:9px;transition:.15s}
  .foot-col a:hover{color:var(--maroon)}
  .foot-bottom{border-top:1px solid var(--line);margin-top:36px;padding-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase}

  /* ---------- LOADER ---------- */
  #loader{position:fixed;inset:0;z-index:200;background:#FAF7F2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;transition:opacity .6s ease,visibility .6s ease}
  #loader.done{opacity:0;visibility:hidden;pointer-events:none}
  .loader-badge{position:relative;display:flex;align-items:center;justify-content:center;animation:badgeIn .9s cubic-bezier(.2,.8,.2,1) both}
  .loader-badge::before{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,112,0,.30),transparent 65%);animation:glowPulse 1.6s ease-in-out infinite}
  @keyframes badgeIn{0%{transform:scale(.6) rotate(-12deg);opacity:0}60%{opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
  @keyframes glowPulse{0%,100%{transform:scale(.85);opacity:.5}50%{transform:scale(1.15);opacity:1}}

  /* ============================================================
     DEPTH & MOTION SYSTEM
     Faked depth (shadow layering + small transforms + parallax).
     No WebGL. GPU-friendly (transform/opacity only).
     All expensive effects gated behind capability + reduced-motion.
     ============================================================ */
  :root{
    --elev-1:0 1px 2px rgba(42,21,19,.04), 0 2px 6px rgba(42,21,19,.05);
    --elev-2:0 4px 10px -2px rgba(42,21,19,.08), 0 10px 24px -6px rgba(42,21,19,.10);
    --elev-3:0 10px 24px -8px rgba(42,21,19,.12), 0 26px 56px -18px rgba(42,21,19,.18);
    --elev-maroon:0 18px 44px -16px rgba(139,26,46,.40);
  }
  .proof, .price-grid, .demo-grid, .contact-grid, .steps{
    perspective:1400px;perspective-origin:center 40%;
  }
  .tilt{
    transform:perspective(1400px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) translateZ(var(--tz,0px));
    transform-style:preserve-3d;
    transition:transform .4s cubic-bezier(.2,.8,.2,1), box-shadow .4s ease;
    will-change:auto;
  }
  .tilt.tilting{transition:transform .08s linear, box-shadow .2s ease}
  .tilt .tilt-layer{transform:translateZ(28px);transform-style:preserve-3d}
  .proof-card{box-shadow:var(--elev-2)}
  .proof-card:hover, .proof-card.tilting{box-shadow:var(--elev-3)}
  .plan{box-shadow:var(--elev-2)}
  .plan.pro{box-shadow:var(--elev-3), 0 26px 60px -30px rgba(255,112,0,.4)}
  .contact-card{box-shadow:var(--elev-2)}
  .ledger{box-shadow:var(--elev-3)}
  .chr-card{box-shadow:var(--elev-1)}
  .chr-pro{box-shadow:var(--elev-maroon)}
  .parallax{will-change:transform}
  [data-parallax]{will-change:transform}
  /* touch ergonomics: 44x44 min targets */
  .mtb-item{min-height:48px}
  nav.links a{min-height:40px;display:inline-flex;align-items:center}
  .btn, .calc-reveal-btn, .dn-btn, .ov-btn, .stake-chip, .charity-chip,
  .vstep, .oc-btn, .email-form button, .email-card .close, .sr-close,
  .ch-recalc-btn, .dc-reset{min-height:44px}
  /* press-state equivalents for every hover (touch can't hover) */
  .btn:active{transform:translateY(1px) scale(.985)}
  .calc-reveal-btn:active{transform:scale(.97)}
  .stake-chip:active{border-color:var(--maroon);background:#F3DEE2}
  .charity-chip:active{border-color:var(--maroon)}
  .vstep:active{border-color:var(--green)}
  .dn-btn:active{border-color:var(--maroon);transform:translateY(1px)}
  .mtb-item:active{background:var(--cream-2);transform:scale(.94)}
  .cc-val:active{color:var(--orange)}
  nav.links a:active{background:var(--cream-2)}
  .proof-card:active, .plan:active, .contact-card:active{box-shadow:var(--elev-3)}
  .tilt.press{transform:perspective(1400px) translateZ(-10px) scale(.99)}
  /* safe-area insets for notched devices on fixed bars */
  header.nav{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  .mobile-tabbar{padding-left:calc(4px + env(safe-area-inset-left));padding-right:calc(4px + env(safe-area-inset-right))}
  /* reduced motion: strip tilt+parallax, keep static shadow depth */
  @media(prefers-reduced-motion:reduce){
    .tilt{transform:none !important;transition:none !important;will-change:auto !important}
    .parallax,[data-parallax]{transform:none !important;will-change:auto !important}
    .ch-blob{animation:none !important}
  }

  /* ===== CALCULATOR HERO ===== */
  .calc-hero{
    position:relative;overflow:hidden;
    background:#FAF7F2;
    border-bottom:1px solid var(--line);
    padding:80px 0 90px;
  }
  /* animated blobs - subtle, behind the card, site-tinted */
  .ch-mesh{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .ch-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.18}
  .ch-blob-1{width:600px;height:600px;top:-140px;left:-120px;background:radial-gradient(circle,var(--maroon),transparent 65%);animation:blobDrift1 18s ease-in-out infinite}
  .ch-blob-2{width:480px;height:480px;top:40px;right:-100px;background:radial-gradient(circle,var(--orange),transparent 65%);animation:blobDrift2 14s ease-in-out infinite}
  .ch-blob-3{width:420px;height:420px;bottom:-100px;left:40%;background:radial-gradient(circle,var(--amber),transparent 65%);animation:blobDrift3 20s ease-in-out infinite}
  @keyframes blobDrift1{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(60px,40px) scale(1.1)}70%{transform:translate(-30px,60px) scale(.95)}}
  @keyframes blobDrift2{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-50px,30px) scale(1.08)}65%{transform:translate(40px,-50px) scale(.92)}}
  @keyframes blobDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.12)}}

  .ch-inner{position:relative;z-index:1}

  /* top badge - same as the rest of the site */
  .ch-top-badge{
    display:inline-flex;align-items:center;gap:10px;margin-bottom:28px;
    background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 18px;
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--maroon);font-weight:600;
  }
  .ch-top-badge .pulse-wrap{position:relative;width:8px;height:8px}
  .ch-top-badge .pulse-wrap i{position:absolute;inset:0;border-radius:50%;background:var(--orange)}
  .ch-top-badge .pulse-wrap i:first-child{animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite}

  /* headline - site ink colors, gradient only on the highlight span */
  .ch-headline{text-align:center;margin-bottom:48px}
  .ch-headline h1{
    font-family:var(--display);font-weight:800;
    font-size:clamp(36px,5.5vw,68px);letter-spacing:-.04em;line-height:.97;
    color:var(--ink);margin-bottom:18px;
  }
  .ch-hl{
    background:linear-gradient(100deg,var(--maroon) 0%,var(--orange-deep) 40%,var(--orange) 70%,var(--amber) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .ch-sub{font-size:18px;color:var(--ink-soft);max-width:520px;margin:0 auto}

  /* main card - white with site border */
  .ch-card{
    display:grid;grid-template-columns:1fr auto 1.4fr;gap:0;
    background:#fff;
    border:1px solid var(--line);border-radius:26px;overflow:hidden;
    box-shadow:0 24px 70px -30px rgba(42,21,19,.14);
  }
  .ch-sliders{padding:36px 38px}
  .ch-divider{width:1px;background:var(--line);margin:24px 0}
  .ch-results{padding:36px 38px;background:var(--cream-2)}

  /* slider section labels */
  .chs-label{
    font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:24px;
  }
  .chs-block{margin-bottom:26px}
  .chs-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .chs-row span{font-size:14px;color:var(--ink);font-weight:500}

  /* the live values - these are colorful */
  .chs-val{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.02em;color:var(--maroon)}
  .chs-val.danger{color:var(--orange)}

  /* sliders - site-colored thumb */
  .ch-range{
    width:100%;height:6px;border-radius:3px;outline:none;cursor:pointer;
    -webkit-appearance:none;appearance:none;background:var(--line);
  }
  .ch-range::-webkit-slider-thumb{
    -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:#fff;border:2.5px solid var(--maroon);
    box-shadow:0 2px 8px rgba(139,26,46,.2);cursor:pointer;transition:.15s;
  }
  .ch-range::-webkit-slider-thumb:hover{transform:scale(1.2);background:var(--maroon)}
  .ch-range::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2.5px solid var(--maroon);cursor:pointer}
  .ch-range-red::-webkit-slider-thumb{border-color:var(--orange)}
  .ch-range-red::-webkit-slider-thumb:hover{background:var(--orange)}
  .chs-ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);margin-top:6px;letter-spacing:.06em}

  /* result comparison cards - cream bg, colorful numbers+bars */
  .chr-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
  .chr-card{
    border-radius:16px;padding:16px 18px;
    background:#fff;border:1px solid var(--line);
  }
  .chr-tag{
    font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:4px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .chr-pro-badge{
    background:var(--orange);color:#fff;
    font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.04em;
  }
  /* the big dollar numbers - vivid per tier */
  .chr-big{
    font-family:var(--display);font-weight:800;font-size:34px;
    letter-spacing:-.03em;line-height:1;
    transition:all .3s ease;
  }
  .chr-bad .chr-big{color:var(--maroon)}
  .chr-mid .chr-big{color:#1F8A55}
  .chr-pro .chr-big{
    background:linear-gradient(110deg,var(--maroon),var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .chr-unit{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}

  /* animated bars - vivid */
  .chr-bar-wrap{height:5px;border-radius:3px;background:var(--line);overflow:hidden;margin-bottom:8px}
  .chr-bar{height:100%;border-radius:3px;width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .chr-bar-bad{background:linear-gradient(90deg,var(--maroon-deep),var(--maroon))}
  .chr-bar-mid{background:linear-gradient(90deg,#1F8A55,#34C87A)}
  .chr-bar-pro{background:linear-gradient(90deg,var(--maroon),var(--orange),var(--amber))}

  .chr-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.55}

  /* annual callout - site-toned with amber accent */
  .ch-annual{
    background:var(--cream-2);border:1px solid var(--line);
    border-radius:12px;padding:12px 16px;
    font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);
    line-height:1.6;margin-bottom:20px;
  }
  .ch-annual b{color:var(--maroon);font-weight:700}

  .ch-cta-row{display:flex;align-items:center;gap:18px;margin-bottom:16px;flex-wrap:wrap;margin-top:20px}
  .ch-cta-btn{padding:14px 22px;font-size:15px;border-radius:12px;white-space:nowrap}
  .ch-link{font-size:14px;color:var(--ink-soft);font-weight:500;transition:.15s;white-space:nowrap}
  .ch-link:hover{color:var(--maroon)}

  .ch-assure{display:flex;gap:22px;flex-wrap:wrap;font-size:13px;color:var(--ink-soft)}
  .ch-assure span{display:inline-flex;align-items:center;gap:7px}
  .ch-assure svg{stroke:var(--maroon);flex:0 0 auto}

  /* reveal button */
  .calc-reveal-btn{
    width:100%;padding:18px 24px;border:none;border-radius:15px;
    background:linear-gradient(110deg,var(--maroon) 0%,var(--orange-deep) 60%,var(--orange) 100%);
    color:#fff;font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:-.01em;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;
    transition:box-shadow .2s ease,transform .15s ease;
    position:relative;overflow:hidden;margin-bottom:0;
  }
  .calc-reveal-btn .sheen{position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);transform:translateX(-120%);transition:none}
  .calc-reveal-btn:hover{box-shadow:0 16px 42px rgba(139,26,46,.4);transform:translateY(-2px)}
  .calc-reveal-btn:hover .sheen{transform:translateX(120%);transition:transform .55s ease}
  .calc-reveal-btn:active{transform:scale(.98)}

  /* chr-cards entry animation */
  .chr-card{transition:opacity .45s ease,transform .45s cubic-bezier(.15,.9,.3,1)}
  .chr-card.card-hidden{opacity:0;transform:translateY(16px)}

  /* recalc link */
  .ch-recalc-btn{
    width:100%;margin-top:12px;background:transparent;border:1.5px solid var(--line);
    color:var(--ink-soft);border-radius:11px;padding:11px;
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    cursor:pointer;transition:.15s;
  }
  .ch-recalc-btn:hover{border-color:var(--maroon);color:var(--maroon)}

  @media(max-width:900px){
    .ch-card{grid-template-columns:1fr;gap:0}
    .ch-divider{width:calc(100% - 48px);height:1px;margin:0 24px}
    .ch-sliders,.ch-results{padding:28px 28px}
    .chr-cards{gap:10px}
  }
  @media(max-width:600px){
    .ch-sliders,.ch-results{padding:22px 20px}
    .ch-headline h1{font-size:clamp(30px,9vw,48px)}
    .ch-cta-row{flex-direction:column;align-items:stretch}
    .ch-cta-btn{justify-content:center}
  }

  /* Keep section backgrounds visually identical across viewports.
     Decorative tinting overlays read fine on desktop where they sit at the edges,
     but on narrow viewports they fill the visible area and make those sections look
     warmer/darker than the rest. Hide them under 900px so every section stays cream. */
  @media(max-width:900px){
    .ch-mesh,.hero-glow{display:none}
  }
